<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Usage Tracker</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      width: 280px;
      min-height: 200px;
    }

    /* ── Header ── */
    .header {
      background: #f7f5ff;
      border-bottom: 1px solid #e8e4f0;
      padding: 12px 14px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-icon {
      width: 20px;
      height: 20px;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #5436a3;
      letter-spacing: -0.01em;
    }

    /* ── Rate limit warning banner ── */
    .rate-limit-banner {
      display: none;
      background: #fef2f2;
      border-bottom: 1px solid #fecaca;
      padding: 8px 14px;
      color: #b91c1c;
      font-size: 12px;
      font-weight: 500;
    }

    .rate-limit-banner.visible {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Main stats ── */
    .stats {
      padding: 14px 14px 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .stat-label {
      color: #6b7280;
      font-size: 12px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }

    .stat-value .stat-limit {
      font-size: 12px;
      font-weight: 400;
      color: #9ca3af;
    }

    /* ── Progress bar ── */
    .progress-section {
      padding: 0 14px 12px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .progress-label span {
      font-size: 11px;
      color: #9ca3af;
    }

    .progress-label .progress-pct {
      font-weight: 600;
      color: #6b7280;
    }

    .progress-track {
      height: 6px;
      background: #f3f4f6;
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 9999px;
      background: #22c55e;
      transition: width 0.3s ease, background 0.3s ease;
      max-width: 100%;
    }

    .progress-fill.warn {
      background: #f59e0b;
    }

    .progress-fill.danger {
      background: #ef4444;
    }

    /* ── Secondary stats ── */
    .secondary-stats {
      display: flex;
      border-top: 1px solid #f3f4f6;
      border-bottom: 1px solid #f3f4f6;
    }

    .sec-stat {
      flex: 1;
      padding: 10px 14px;
      text-align: center;
    }

    .sec-stat + .sec-stat {
      border-left: 1px solid #f3f4f6;
    }

    .sec-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      display: block;
    }

    .sec-stat-label {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
      display: block;
    }

    /* ── Footer actions ── */
    .footer {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-reset {
      font-size: 11px;
      color: #9ca3af;
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      padding: 4px 9px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-reset:hover {
      color: #ef4444;
      border-color: #fca5a5;
    }

    .footer-link {
      font-size: 11px;
      color: #c4b5fd;
      text-decoration: none;
    }

    .footer-link:hover {
      color: #5436a3;
      text-decoration: underline;
    }

    /* ── Loading state ── */
    .loading {
      padding: 24px 14px;
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
    }

    /* ── Not on Claude notice ── */
    .not-claude {
      padding: 20px 14px;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.5;
    }

    .not-claude a {
      color: #5436a3;
      text-decoration: none;
    }

    .not-claude a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="header">
    <svg class="header-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="20" height="20" rx="5" fill="#5436a3"/>
      <text x="10" y="14.5" text-anchor="middle" font-family="-apple-system, sans-serif" font-weight="700" font-size="12" fill="white">C</text>
    </svg>
    <span class="header-title">Claude Usage Tracker</span>
  </div>

  <div class="rate-limit-banner" id="rateLimitBanner">
    ⚠️ Rate limit detected on Claude.ai
  </div>

  <div id="mainContent">
    <div class="loading" id="loadingState">Loading…</div>

    <div id="statsContent" style="display:none;">
      <div class="stats">
        <div class="stat-row">
          <span class="stat-label">Messages today</span>
          <span class="stat-value" id="countToday">0 <span class="stat-limit">/ ~45</span></span>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-label">
          <span>~5-hour window usage</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>

      <div class="secondary-stats">
        <div class="sec-stat">
          <span class="sec-stat-value" id="countWeek">0</span>
          <span class="sec-stat-label">this week</span>
        </div>
        <div class="sec-stat">
          <span class="sec-stat-value" id="countSession">0</span>
          <span class="sec-stat-label">this session</span>
        </div>
      </div>

      <div class="footer">
        <button class="btn-reset" id="btnReset">Reset counts</button>
        <a class="footer-link" href="https://claude.ai" target="_blank" rel="noopener">Open Claude.ai →</a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
